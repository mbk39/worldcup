name: Feed live results

# Pulls live/final WC scores from ESPN and pushes them into the app.
# Target cadence ~10 min. NOTE: GitHub runs scheduled jobs on a best-effort
# basis and heavily delays/drops them at the top of the hour, so we schedule on
# odd minutes (…3, …13, …) to dodge the :00 congestion spike. Use the
# "Run workflow" button (workflow_dispatch) for an instant manual update.
on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:

# Run the bundled JS actions (checkout/setup-python) on Node 24 to silence the
# Node 20 deprecation warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Push results
        env:
          APP_URL: ${{ vars.APP_URL || 'https://mbk39.pythonanywhere.com' }}
          FEED_TOKEN: ${{ secrets.FEED_TOKEN }}
        run: python feeder/feed_results.py
